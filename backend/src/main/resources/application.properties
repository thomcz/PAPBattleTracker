spring.application.name=backend
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
# JWT Configuration — override JWT_SECRET in production via environment variable
jwt.secret=${JWT_SECRET:myVerySecretKeyThatMustBeAtLeast256BitsLongForHS256AlgorithmToWorkProperly}
jwt.expiration=86400000
# CORS — override CORS_ALLOWED_ORIGINS in production via environment variable
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
# Logging
logging.level.org.springframework.security=WARN
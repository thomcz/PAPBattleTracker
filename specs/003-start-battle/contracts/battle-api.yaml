openapi: 3.0.0
info:
  title: Battle Tracking API
  version: 1.0.0
  description: REST API for battle creation, turn management, and combat tracking
  contact:
    name: PAPBattleTracker Team

servers:
  - url: http://localhost:8080/api/v1
    description: Local development
  - url: https://api.example.com/api/v1
    description: Production

paths:
  /battles:
    post:
      summary: Create a new battle
      operationId: createBattle
      tags:
        - Battles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBattleRequest'
      responses:
        '201':
          description: Battle created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BattleResponse'
        '400':
          description: Invalid request (e.g., fewer than 2 creatures)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized (missing authentication)
        '404':
          description: One or more creatures not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

    get:
      summary: List battles for current user
      operationId: listBattles
      tags:
        - Battles
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, ENDED]
          description: Filter by battle status
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
          description: Maximum number of battles to return
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          description: Number of battles to skip
      responses:
        '200':
          description: List of battles
          content:
            application/json:
              schema:
                type: object
                properties:
                  battles:
                    type: array
                    items:
                      $ref: '#/components/schemas/BattleResponse'
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
        '401':
          description: Unauthorized
      security:
        - bearerAuth: []

  /battles/{battleId}:
    get:
      summary: Get battle state
      operationId: getBattle
      tags:
        - Battles
      parameters:
        - name: battleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Battle details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BattleResponse'
        '401':
          description: Unauthorized
        '404':
          description: Battle not found
      security:
        - bearerAuth: []

  /battles/{battleId}/turn:
    post:
      summary: Advance to next turn
      operationId: progressTurn
      tags:
        - Combat
      parameters:
        - name: battleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Turn advanced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BattleResponse'
        '400':
          description: Invalid state (e.g., battle already ended)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '404':
          description: Battle not found
      security:
        - bearerAuth: []

  /battles/{battleId}/damage:
    post:
      summary: Apply damage to a creature
      operationId: applyDamage
      tags:
        - Combat
      parameters:
        - name: battleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DamageRequest'
      responses:
        '200':
          description: Damage applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BattleResponse'
        '400':
          description: Invalid damage (e.g., non-positive, creature already defeated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '404':
          description: Battle or creature not found
      security:
        - bearerAuth: []

  /battles/{battleId}/end:
    post:
      summary: Conclude battle (manual end)
      operationId: endBattle
      tags:
        - Combat
      parameters:
        - name: battleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Battle ended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BattleResponse'
        '400':
          description: Invalid state (e.g., battle already ended)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '404':
          description: Battle not found
      security:
        - bearerAuth: []

  /battles/{battleId}/log:
    get:
      summary: Get combat log (paginated)
      operationId: getCombatLog
      tags:
        - Combat
      parameters:
        - name: battleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
          description: Max log entries to return
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          description: Number of entries to skip
      responses:
        '200':
          description: Combat log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: '#/components/schemas/CombatLogEntry'
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
        '401':
          description: Unauthorized
        '404':
          description: Battle not found
      security:
        - bearerAuth: []

components:
  schemas:
    CreateBattleRequest:
      type: object
      required:
        - creatureIds
        - initiativeRolls
      properties:
        creatureIds:
          type: array
          minItems: 2
          items:
            type: string
            format: uuid
          description: List of creature IDs to participate in battle
        initiativeRolls:
          type: object
          description: Map of creatureId -> d20 roll result (1-20)
          additionalProperties:
            type: integer
            minimum: 1
            maximum: 20
        notes:
          type: string
          maxLength: 500
          description: Optional notes about the battle

    BattleResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [ACTIVE, ENDED]
        round:
          type: integer
          minimum: 1
        turn:
          type: integer
          minimum: 0
        currentActor:
          $ref: '#/components/schemas/BattleCreatureResponse'
        creatures:
          type: array
          items:
            $ref: '#/components/schemas/BattleCreatureResponse'
        initiativeOrder:
          type: array
          items:
            type: string
            format: uuid
          description: List of creatureIds in turn order
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
          format: uuid
        endedAt:
          type: string
          format: date-time
          nullable: true
        eventCount:
          type: integer
          description: Total events in event stream

    BattleCreatureResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        creatureId:
          type: string
          format: uuid
        name:
          type: string
        maxHp:
          type: integer
        currentHp:
          type: integer
        status:
          type: string
          enum: [ACTIVE, DEFEATED]
        ac:
          type: integer
          description: Armor Class
        initiativeModifier:
          type: integer
        initiativeRoll:
          type: integer
          minimum: 1
          maximum: 20
        initiativeTotal:
          type: integer
          description: Computed: modifier + roll

    DamageRequest:
      type: object
      required:
        - creatureId
        - damage
      properties:
        creatureId:
          type: string
          format: uuid
          description: Target creature
        damage:
          type: integer
          minimum: 1
          description: HP reduction (must be positive)
        source:
          type: string
          maxLength: 200
          description: Optional source of damage (e.g., "Attack by Goblin A")

    CombatLogEntry:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        message:
          type: string
          description: Human-readable log entry
        type:
          type: string
          enum: [ROUND_START, CREATURE_ACTION, DAMAGE, DEFEAT, BATTLE_END]
        data:
          type: object
          description: Event-specific data
          additionalProperties: true

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        timestamp:
          type: string
          format: date-time
        path:
          type: string

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from authentication endpoint

tags:
  - name: Battles
    description: Battle lifecycle operations
  - name: Combat
    description: Combat mechanics (turns, damage, logs)

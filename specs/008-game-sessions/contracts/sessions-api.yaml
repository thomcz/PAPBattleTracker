openapi: 3.0.3
info:
  title: Game Sessions API
  version: 1.0.0
  description: API contract for game session management

paths:
  /api/sessions:
    post:
      summary: Create a new game session
      operationId: createSession
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          description: Validation error (e.g., missing name)
        '401':
          description: Not authenticated

    get:
      summary: List all sessions for the authenticated user
      operationId: listSessions
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SessionStatus'
      responses:
        '200':
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionSummaryResponse'
        '401':
          description: Not authenticated

  /api/sessions/{sessionId}:
    get:
      summary: Get session details with its battles
      operationId: getSession
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionDetailResponse'
        '403':
          description: Not the session owner
        '404':
          description: Session not found

    put:
      summary: Rename a session
      operationId: renameSession
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenameSessionRequest'
      responses:
        '200':
          description: Session renamed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          description: Validation error
        '403':
          description: Not the session owner
        '404':
          description: Session not found

    delete:
      summary: Delete a session and all its battles
      operationId: deleteSession
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Session deleted
        '403':
          description: Not the session owner
        '404':
          description: Session not found

  /api/sessions/{sessionId}/start:
    post:
      summary: Transition session from PLANNED to STARTED
      operationId: startSession
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '403':
          description: Not the session owner
        '404':
          description: Session not found
        '409':
          description: Invalid state transition (session not in PLANNED state)

  /api/sessions/{sessionId}/finish:
    post:
      summary: Transition session from STARTED to FINISHED
      operationId: finishSession
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session finished
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '403':
          description: Not the session owner
        '404':
          description: Session not found
        '409':
          description: Invalid state transition (session not in STARTED state)

  /api/sessions/{sessionId}/battles:
    post:
      summary: Create a battle within a session
      operationId: createBattleInSession
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBattleRequest'
      responses:
        '201':
          description: Battle created within session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BattleResponse'
        '400':
          description: Validation error
        '403':
          description: Not the session owner
        '404':
          description: Session not found
        '409':
          description: Session is FINISHED — cannot add battles

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SessionStatus:
      type: string
      enum:
        - PLANNED
        - STARTED
        - FINISHED

    CreateSessionRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100

    RenameSessionRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100

    CreateBattleRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255

    SessionResponse:
      type: object
      properties:
        sessionId:
          type: string
          format: uuid
        name:
          type: string
        status:
          $ref: '#/components/schemas/SessionStatus'
        createdAt:
          type: string
          format: date-time
        lastModified:
          type: string
          format: date-time

    SessionSummaryResponse:
      type: object
      properties:
        sessionId:
          type: string
          format: uuid
        name:
          type: string
        status:
          $ref: '#/components/schemas/SessionStatus'
        battleCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        lastModified:
          type: string
          format: date-time

    SessionDetailResponse:
      type: object
      properties:
        sessionId:
          type: string
          format: uuid
        name:
          type: string
        status:
          $ref: '#/components/schemas/SessionStatus'
        battles:
          type: array
          items:
            $ref: '#/components/schemas/BattleSummary'
        createdAt:
          type: string
          format: date-time
        lastModified:
          type: string
          format: date-time

    BattleSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        lastModified:
          type: string
          format: date-time

    BattleResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
        creatures:
          type: array
          items:
            type: object
        currentTurn:
          type: integer
        round:
          type: integer
        createdAt:
          type: string
          format: date-time
        lastModified:
          type: string
          format: date-time

<div class="dialog-overlay" (click)="close()">
  <div class="dialog" (click)="$event.stopPropagation()">
    <div class="dialog-header">
      <h2>{{ isEditing ? 'Edit Creature' : 'Create Creature' }}</h2>
      <button class="btn-close" (click)="close()" aria-label="Close">&times;</button>
    </div>

    @if (error()) {
      <div class="error-banner">{{ error() }}</div>
    }

    <form [formGroup]="creatureForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Name</label>
        <input id="name" type="text" formControlName="name" placeholder="Creature name" />
        @if (getFieldError('name')) {
          <span class="field-error">{{ getFieldError('name') }}</span>
        }
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="hitPoints">Hit Points</label>
          <input id="hitPoints" type="number" formControlName="hitPoints" min="1" max="999" />
          @if (getFieldError('hitPoints')) {
            <span class="field-error">{{ getFieldError('hitPoints') }}</span>
          }
        </div>

        <div class="form-group">
          <label for="armorClass">Armor Class</label>
          <input id="armorClass" type="number" formControlName="armorClass" min="0" max="30" />
          @if (getFieldError('armorClass')) {
            <span class="field-error">{{ getFieldError('armorClass') }}</span>
          }
        </div>
      </div>

      <div class="dialog-actions">
        <button type="button" class="btn-secondary" (click)="close()">Cancel</button>
        <button type="submit" class="btn-primary" [disabled]="loading()">
          @if (loading()) {
            Saving...
          } @else {
            {{ isEditing ? 'Update' : 'Create' }}
          }
        </button>
      </div>
    </form>
  </div>
</div>

<nav class="bottom-nav" aria-label="Main navigation">
  @for (item of navItems; track item.route) {
    <a class="nav-tab"
       [routerLink]="item.route"
       routerLinkActive="active"
       [routerLinkActiveOptions]="{exact: item.route === '/home'}">
      @switch (item.icon) {
        @case ('battles') {
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="nav-icon">
            <rect x="2" y="2" width="9" height="9" rx="1.5"/>
            <rect x="13" y="2" width="9" height="9" rx="1.5"/>
            <rect x="2" y="13" width="9" height="9" rx="1.5"/>
            <rect x="13" y="13" width="9" height="9" rx="1.5"/>
          </svg>
        }
@case ('monsters') {
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="nav-icon">
            <path d="M6 2L2 8l4 2-2 8 8-4 8 4-2-8 4-2-4-6-4 4z"/>
          </svg>
        }
        @case ('players') {
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="nav-icon">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        }
      }
      <span class="nav-label">{{ item.label }}</span>
    </a>
  }
</nav>
